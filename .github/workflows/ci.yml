name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Black (format check)
        run: poetry run black --check api tests

      - name: Ruff (lint)
        run: poetry run ruff check api tests

      - name: mypy (type check, advisory)
        # mypy is advisory while we work down the legacy backlog (751 errors at last count).
        # Track remediation in docs/PHASE_2.md before flipping this to required.
        continue-on-error: true
        run: poetry run mypy api

      - name: Unit tests
        run: poetry run pytest tests/unit/ -v --tb=short

      - name: API tests
        run: poetry run pytest tests/api/ -v --tb=short

      - name: CLI tests
        run: poetry run pytest tests/cli/ -v --tb=short
