include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - lib/api/**          # generated by openapi-generator (lands in 7.2)
    - "**/*.g.dart"       # riverpod / freezed codegen output
    - "**/*.freezed.dart"

linter:
  rules:
    # very_good_analysis is opinionated; relax for screen files where
    # switch-on-enum without default is intentional and exhaustive.
    no_default_cases: false

    # Project-specific docs already live in specs/022 and brand-spec.md;
    # forcing public_member_api_docs adds noise without value here.
    public_member_api_docs: false

    # 80-char hard limit is unnecessarily tight for declarative widget code
    # whose nested children naturally extend right. Keep the spirit (don't
    # let lines run wild) but lift the floor.
    lines_longer_than_80_chars: false

    # Default-value lints fire on Material/Cupertino-style explicit
    # parameters that are intentionally explicit for readability.
    avoid_redundant_argument_values: false
