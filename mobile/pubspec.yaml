name: signupflow_mobile
description: "SignUpFlow iOS app — volunteer scheduling. See specs/022-flutter-mobile-app/spec.md."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: ^3.41.0

dependencies:
  built_collection: ^5.1.1          # required by signupflow_api (built_value collections)
  built_value: ^8.9.5               # required by signupflow_api (immutable models)
  cupertino_icons: ^1.0.8
  dio: ^5.7.0                       # networking; pairs with dart-dio openapi codegen
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1          # state management
  flutter_secure_storage: ^9.2.2    # JWT in iOS Keychain
  go_router: ^14.6.0                # declarative routing + deep links
  google_fonts: ^6.2.1              # Inter + JetBrains Mono per brand-spec
  intl: ^0.19.0                     # dates / timezones
  riverpod_annotation: ^2.6.1       # Riverpod codegen annotation
  signupflow_api:                   # generated dart-dio client; run `make mobile-codegen` to refresh
    path: api_client

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.4
  riverpod_lint: ^2.6.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
